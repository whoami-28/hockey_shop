<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Корзина | POWERPLAY HOCKEY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-surface text-on-surface min-h-screen">
    <header class="bg-white border-b-2 border-gray-200 sticky top-0 z-50">
        <nav class="flex justify-between items-center h-20 px-8 max-w-[1440px] mx-auto w-full">
            <a href="Main.html" class="text-2xl font-black italic text-blue-950 font-lexend uppercase tracking-tighter">
                POWERPLAY HOCKEY
            </a>
            <div class="hidden md:flex items-center gap-2">
                <a class="px-4 py-2 font-lexend font-bold uppercase tracking-tighter text-gray-600 hover:text-red-600 hover:bg-gray-50 transition-all duration-150"
                    href="Catalog.html">Каталог</a>
                <a class="px-4 py-2 font-lexend font-bold uppercase tracking-tighter text-secondary bg-red-50 transition-all duration-150"
                    href="SizeGuide.html">Умный подбор</a>
            </div>
            <div class="flex items-center gap-6">
                <a href="ShopingCart.html"
                    class="material-symbols-outlined text-gray-500 hover:text-secondary transition-colors inline-block">shopping_cart</a>
                <a href="UserProfile.html"
                    class="material-symbols-outlined text-gray-500 hover:text-secondary transition-colors inline-block">account_circle</a>
            </div>
        </nav>
    </header>

    <main class="max-w-[1440px] mx-auto px-8 py-16">
        <h1 class="font-lexend text-5xl font-bold uppercase text-primary mb-12">Корзина</h1>
        <div id="cart-items" class="grid grid-cols-12 gap-8 items-start">
        </div>
    </main>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cart-items');

            if (cart.length === 0) {
                container.innerHTML = '<p class="col-span-12 text-center text-xl">Корзина пуста</p>';
                return;
            }

            let total = 0;
            let itemsHtml = '<div class="col-span-12 lg:col-span-8 flex flex-col gap-6">';

            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                itemsHtml += `
                    <div class="bg-white border border-gray-300 p-6 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-xl">${item.name}</h3>
                            <p>${item.quantity} шт. x ${item.price} BYN</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-secondary hover:underline">Удалить</button>
                    </div>
                `;
            });
            itemsHtml += '</div>';

            itemsHtml += `
                <aside class="col-span-12 lg:col-span-4 bg-white border-2 border-primary p-8">
                    <h2 class="text-2xl font-bold mb-6 font-lexend">ИТОГО: ${total.toFixed(2)} BYN</h2>
                    <a href="Checkout.html" class="block w-full bg-secondary text-white py-4 text-center font-bold uppercase hover:bg-red-800 transition-all">Оформить заказ</a>
                </aside>
            `;

            container.innerHTML = itemsHtml;
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart'));
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        renderCart();
    </script>
</body>

</html>
