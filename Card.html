<!DOCTYPE html>
<html class="light" lang="ru">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>POWERPLAY HOCKEY | Товар</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body class="bg-background text-on-surface">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 transition-all duration-300 shadow-sm">
        <div class="flex justify-between items-center h-20 px-8 max-w-[1440px] mx-auto w-full">
            <a href="Main.html" class="text-2xl font-black italic text-blue-950 font-lexend uppercase tracking-tighter transition-transform duration-300 hover:scale-105">
                POWERPLAY HOCKEY
            </a>
            <nav class="hidden lg:flex items-center space-x-8 h-full">
                <a class="nav-link text-gray-600 font-bold hover:text-secondary font-lexend uppercase tracking-tighter transition-colors duration-200" href="Catalog.html">Коньки</a>
                <a class="nav-link text-gray-600 font-bold hover:text-secondary font-lexend uppercase tracking-tighter transition-colors duration-200" href="Catalog.html">Клюшки</a>
                <a class="nav-link text-gray-600 font-bold hover:text-secondary font-lexend uppercase tracking-tighter transition-colors duration-200" href="Catalog.html">Защита</a>
                <a class="nav-link text-gray-600 font-bold hover:text-secondary font-lexend uppercase tracking-tighter transition-colors duration-200" href="Catalog.html">Шлемы</a>
                <a class="nav-link text-gray-600 font-bold hover:text-secondary font-lexend uppercase tracking-tighter transition-colors duration-200" href="Catalog.html">Вратарь</a>
                <a class="nav-link text-gray-600 font-bold hover:text-secondary font-lexend uppercase tracking-tighter transition-colors duration-200" href="Catalog.html">Одежда</a>
            </nav>
            <div class="flex items-center space-x-6">
                <a href="ShopingCart.html" class="relative p-2 scale-100 hover:scale-110 active:scale-95 transition-all text-secondary">
                    <span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
                    <span id="header-cart-badge" class="absolute -top-1 -right-1 bg-primary text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white scale-0 transition-transform duration-300">0</span>
                </a>
                <a href="UserProfile.html" class="p-2 scale-100 hover:scale-110 active:scale-95 transition-all text-gray-600 hover:text-primary">
                    <span class="material-symbols-outlined text-[28px]">account_circle</span>
                </a>
            </div>
        </div>
    </header>
    <main class="max-w-[1440px] mx-auto px-8 py-16" id="product-container">
        <div class="text-center text-gray-500 py-20">Загрузка товара...</div>
    </main>

    <footer class="bg-gray-100 border-t-2 border-gray-300 mt-20">
        <div class="max-w-[1440px] mx-auto px-8 py-12 grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
            <div>
                <span class="text-lg font-black text-blue-950 font-lexend uppercase tracking-tighter">POWERPLAY
                    HOCKEY</span>
                <p class="font-lexend text-xs font-medium uppercase tracking-widest text-gray-500 mt-4">© 2024 POWERPLAY
                    HOCKEY. ЭКИПИРОВКА ДЛЯ ЛЬДА.</p>
            </div>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function loadProductDetails() {
            if (!productId) {
                document.getElementById('product-container').innerHTML = '<div class="text-center text-red-500 py-20">Товар не найден (отсутствует ID)</div>';
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/api/tovar/${productId}`);
                if (!response.ok) throw new Error('Товар не найден в базе');
                const product = await response.json();

                const html = `
                <nav class="mb-8 flex items-center gap-2 text-xs text-gray-500 uppercase tracking-widest font-bold">
                    <a class="hover:text-secondary" href="Main.html">Главная</a>
                    <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                    <a class="hover:text-secondary" href="Catalog.html">Каталог</a>
                    <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                    <span class="text-black">${product.Kategoriya_Nazvanie || 'Товар'}</span>
                </nav>

                <div class="grid grid-cols-12 gap-8 mb-16">
                    <div class="col-span-12 lg:col-span-7 space-y-6">
                        <div class="studio-bg aspect-[4/5] relative overflow-hidden flex items-center justify-center border border-gray-200">
                            <span class="material-symbols-outlined text-9xl text-gray-300">sports_hockey</span>
                            <div class="absolute top-8 left-8">
                                <span class="bg-primary text-white px-3 py-1 font-bold text-xs uppercase tracking-tighter">${product.Brend_Naimenovanie || 'PRO'}</span>
                            </div>
                        </div>
                    </div>

                    <div class="col-span-12 lg:col-span-5 space-y-12">
                        <div class="space-y-2">
                            <p class="text-gray-500 font-bold tracking-widest uppercase text-sm">${product.Model_Naimenovanie || ''}</p>
                            <h1 class="font-lexend text-5xl uppercase font-black leading-none">${product.Naimenovanie}</h1>
                            <p class="text-secondary font-bold text-3xl font-lexend mt-4">${product.Cena} BYN</p>
                        </div>
                        
                        <p class="text-gray-600 max-w-prose text-lg leading-relaxed">
                            ${product.Harakteristiki || 'Описание для данного товара временно отсутствует. Это высококачественная экипировка для профессионалов и любителей хоккея.'}
                        </p>

                        <div class="space-y-6 bg-gray-50 p-6 border border-gray-200">
                            <div class="flex justify-between items-center border-b border-gray-200 pb-4">
                                <span class="font-bold text-xs uppercase tracking-widest text-gray-500">Параметр / Размер</span>
                                <span class="font-bold text-lg text-primary">${product.Razmer || 'Универсальный'}</span>
                            </div>
                            <div class="flex justify-between items-center pb-2">
                                <span class="font-bold text-xs uppercase tracking-widest text-gray-500">Наличие на складе</span>
                                <span class="font-bold text-sm ${product.Kolichestvo > 0 ? 'text-green-600' : 'text-red-600'}">
                                    ${product.Kolichestvo > 0 ? product.Kolichestvo + ' шт.' : 'Нет в наличии'}
                                </span>
                            </div>
                        </div>

                        <div class="flex gap-4 pt-6">
                            <button onclick="addToCartAndRedirect(${product.ID_Tovara}, '${product.Naimenovanie}', ${product.Cena})" 
                                    ${product.Kolichestvo <= 0 ? 'disabled' : ''}
                                    class="flex-[2] ${product.Kolichestvo > 0 ? 'bg-secondary hover:bg-red-800' : 'bg-gray-400 cursor-not-allowed'} text-white font-lexend text-xl font-bold uppercase py-5 transition-transform active:scale-95 flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
                                ${product.Kolichestvo > 0 ? 'В корзину' : 'Нет в наличии'}
                            </button>
                        </div>
                    </div>
                </div>
            `;

                document.getElementById('product-container').innerHTML = html;

            } catch (error) {
                console.error(error);
                document.getElementById('product-container').innerHTML = '<div class="text-center text-red-500 py-20">Ошибка загрузки данных товара</div>';
            }
        }

        function addToCartAndRedirect(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));

            window.location.href = 'ShopingCart.html';
        }

        loadProductDetails();
    </script>
</body>

</html>
