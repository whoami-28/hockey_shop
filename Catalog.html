<!DOCTYPE html>
<html class="light" lang="ru">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-white text-black antialiased">
    <header class="bg-white border-b-2 border-gray-200 sticky top-0 z-50">
        <nav class="flex justify-between items-center h-20 px-8 max-w-[1440px] mx-auto w-full">
            <a href="Main.html" class="text-2xl font-black italic text-blue-950 font-lexend uppercase tracking-tighter">
                POWERPLAY HOCKEY
            </a>
            <div class="hidden md:flex items-center gap-2">
                <a class="px-4 py-2 font-lexend font-bold uppercase tracking-tighter text-gray-600 hover:text-red-600 hover:bg-gray-50 transition-all duration-150"
                    href="Catalog.html">Каталог</a>
                <a class="px-4 py-2 font-lexend font-bold uppercase tracking-tighter text-secondary bg-red-50 transition-all duration-150"
                    href="SizeGuide.html">Умный подбор</a>
            </div>
            <div class="flex items-center gap-6">
                <a href="ShopingCart.html"
                    class="material-symbols-outlined text-gray-500 hover:text-secondary transition-colors inline-block">shopping_cart</a>
                <a href="UserProfile.html"
                    class="material-symbols-outlined text-gray-500 hover:text-secondary transition-colors inline-block">account_circle</a>
            </div>
        </nav>
    </header>

    <main class="max-w-[1440px] mx-auto px-8 py-12">
        <div class="mb-12">
            <h1 class="font-lexend text-6xl text-primary uppercase mb-2 font-black tracking-tighter">Композитные клюшки
            </h1>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <aside class="w-full lg:w-72 flex-shrink-0 space-y-8">
                <h4 class="font-bold uppercase">Бренд</h4>
            </aside>

            <div class="flex-grow">
                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                    <p>Загрузка товаров...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadProducts() {
            try {
                const response = await fetch('http://localhost:3000/api/tovar');
                const products = await response.json();
                const grid = document.getElementById('product-grid');
                grid.innerHTML = '';

                products.forEach(product => {
                    const card = `
                    <div class="group relative bg-white border border-gray-200 hover:border-primary transition-all duration-300">
                        <div class="aspect-[4/5] bg-gray-100 relative overflow-hidden block">
                            <img class="w-full h-full object-cover mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFvGAx_fxGQv1hfyoYj6Jd3aQYfHkvd7t2CSYVpNl2_P6DRRfNYYTlUfJEDHVinB6ZvAfpjW4UW6DUnyLqi4wVnr3HtlppzMTKFK71i26j1vI_a96l0qCg7zD-F1AqZ_Lks8pN8ji4UpLzv7-MBS78RzxWfWsMVOXSVBtdbm5KJI55b4z-mr2IGFpLmlrgfprvMvNVBWQehDQL6lTYSE6juixgu4HV-dWy2M_-wCf9ezZ2_JEXvzXQlykyVdoRprSEbHB2ZkswBP0" alt="${product.Naimenovanie}"/>
                        </div>
                        <div class="p-6">
                            <h3 class="text-2xl font-bold text-primary mb-2 font-lexend">${product.Naimenovanie}</h3>
                            <div class="flex justify-between items-end">
                                <p class="text-2xl font-bold text-primary font-lexend">${product.Cena} BYN</p>
                                <button onclick="addToCart(${product.ID_Tovara}, '${product.Naimenovanie}', ${product.Cena})" 
                                        class="bg-secondary text-white px-4 py-2 font-bold uppercase hover:bg-red-700 transition-all">
                                    В корзину
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                    grid.innerHTML += card;
                });
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(name + ' добавлен в корзину!');
        }

        loadProducts();
    </script>
</body>

</html>
